<!DOCTYPE html>
<html>
<head>
<title>Scientific Calculator</title>

<style>

body{
font-family: Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f0f0f0;
}

/* calculator layout */
#calculator{
background:#222;
padding:30px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.4);
display:grid;
grid-template-columns:auto auto;
grid-gap:20px;
}

/* display */
#screen{
grid-column: span 2;
width:100%;
height:90px;
font-size:24px;
text-align:left;
padding:10px;
border-radius:8px;
border:none;
resize:none;
overflow:auto;
white-space:pre-wrap;
word-wrap:break-word;
}


/* normal buttons */
#buttons{
display:grid;
grid-template-columns:repeat(4,90px);
grid-gap:15px;
}

/* scientific buttons */
#scientific{
display:none;
grid-template-columns:repeat(2,90px);
grid-gap:15px;
align-content:start;
}

/* button style */
button{
width:90px;
height:90px;
font-size:28px;
border:none;
border-radius:10px;
cursor:pointer;
background:#444;
color:white;
}

button:hover{
background:#666;
}

.operator{
background:#ff9500;
}

</style>

</head>

<body>

<div id="calculator">

<textarea id="screen" readonly placeholder="0"></textarea>

<div id="buttons">

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="operator" onclick="press('/')">/</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="operator" onclick="press('*')">*</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="operator" onclick="press('-')">-</button>

<button onclick="press('0')">0</button>
<button onclick="press('(')">(</button>
<button onclick="press(')')">)</button>
<button class="operator" onclick="press('+')">+</button>

<button onclick="press('.')">.</button>
<button class="operator" onclick="calculate()">=</button>
<button onclick="toggleScientific()">SCI</button>
<button onclick="toggleAIMode()" id="aiBtn">AI</button>
<button onclick="backspace()">⌫</button>

<button class="operator" onclick="clearScreen()" style="grid-column: span 4;">C</button>

<button onclick="memoryAdd()">M+</button>
<button onclick="memorySub()">M-</button>
<button onclick="memoryRecall()">MR</button>
<button onclick="memoryClear()">MC</button>

</div>

<div id="scientific">

<button onclick="press('sin(')">sin</button>
<button onclick="press('cos(')">cos</button>

<button onclick="press('tan(')">tan</button>
<button onclick="press('sqrt(')">√</button>

<button onclick="press('log(')">log</button>
<button onclick="press('pi')">π</button>

<button onclick="press('e')">e</button>

</div>

</div>

<script>

let aiMode = false;

function toggleAIMode() {
    aiMode = !aiMode;

    let btn = document.getElementById("aiBtn");
    let screen = document.getElementById("screen");

    if (aiMode) {
        btn.innerText = "AI ON";
        btn.style.background = "green";
        screen.placeholder = "Ask anything...";
        screen.value = "";
    } else {
        btn.innerText = "AI";
        btn.style.background = "#444";
        screen.placeholder = "0";
        screen.value = "";
    }
}

function press(v){
let s=document.getElementById("screen")

if(s.value==="0")
s.value=""

s.value+=v
}

function clearScreen(){
document.getElementById("screen").value=""
}

function backspace(){
let s=document.getElementById("screen")

if(s.value.length>0)
s.value=s.value.slice(0,-1)
}

function toggleScientific(){

let sci=document.getElementById("scientific")

if(sci.style.display==="grid")
sci.style.display="none"
else
sci.style.display="grid"

}

// async function calculate(){

// let expr=document.getElementById("screen").value

// const response=await fetch("/calculate",{
// method:"POST",
// headers:{"Content-Type":"application/json"},
// body:JSON.stringify({expression:expr})
// })


async function calculate() {
    let screen = document.getElementById("screen");
    let input = screen.value;


    let url = aiMode ? "/smart-calc" : "/calculate";

    let payload = aiMode 
        ? {text : input}
        : {expression: input};

    const response = await fetch(url, {
        method: "POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
    })   
    const data = await response.json();
    console.log(data);
    
    if (data.ask) {
        screen.value = data.ask;
    } else if (data.result !== undefined) {
        screen.value = `${data.label || "Answer"}: ${data.result}`;
    } else if (data.error) {
        screen.value = data.error;
    } else {
        screen.value = "Unable to process";
    }

    return;
    
    if (aiMode) {
        if (data.result !== undefined) {
            screen.value = data.result;
        }else {
            screen.value = "Error";
        }
    } else {
        if(data.result !== undefined) {
            screen.value = data.result;
        } else {
            screen.value = "Error";
        }
    }
}



/* keyboard support */

// document.addEventListener("keydown",function(event){

// let key=event.key
// let screen=document.getElementById("screen")

// if(!isNaN(key)||"+-*/().".includes(key)){
// screen.value+=key
// }

// if(key==="Enter"){
// calculate()
// }

// if(key==="Backspace"){
// backspace()
// }

// })

/* Watch how this change as we add AI feature */
document.addEventListener("keydown", function(event) {

    let key = event.key;
    let screen = document.getElementById("screen");

    if (aiMode) {
        if (key === "Backspace") {
            backspace();
            return;
        }

        if (key === "Enter") {
            calculate();
            return;
        }

        if (key.length === 1) {
            screen.value += key;
        }
    }
    else {
       if (!isNaN(key) || "+-*/().".includes(key)) {
        screen.value += key;
        }

        if (key === "Enter") {
            calculate();
        }

        if (key === "Backspace") {
            backspace();
        }
    }
});


/* memory functions */

let memory=0

function memoryAdd(){
memory+=Number(document.getElementById("screen").value||0)
}

function memorySub(){
memory-=Number(document.getElementById("screen").value||0)
}

function memoryRecall(){
document.getElementById("screen").value+=memory
}

function memoryClear(){
memory=0
}

</script>

</body>
</html>
